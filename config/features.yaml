rolling:
  windows:
    - "1h"
    - "6h"
    - "12h"
    - "24h"
  fallbacks:
    - 3
    - 5
    - 10
    - 20
  metrics:
    - "mean"
    - "median"
    - "std"
    - "min"
    - "max"

lags:
  offsets:
    - 1
    - 2
    - 3
    - 5
    - 10

sensor_columns:
  - "Temperature_C"
  - "Vibration_Hz"
  - "Power_Consumption_kW"
  - "Network_Latency_ms"
  - "Packet_Loss_%"
  - "Quality_Control_Defect_Rate_%"
  - "Production_Speed_units_per_hr"
  - "Error_Rate_%"

exclude_from_anomaly:
  - "Efficiency_Status"
  - "Predictive_Maintenance_Score"
  - "Machine_ID"
  - "Date"
  - "Timestamp"
  - "datetime"

leakage_prevention:
  forbidden_inputs:
    - "Efficiency_Status"
    - "Predictive_Maintenance_Score"
